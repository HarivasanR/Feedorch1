spring.application.name=feedorch1
server.port=8080

# --- MySQL Configuration (Updated to port 3307) ---
spring.datasource.url=jdbc:mysql://localhost:3307/feedorch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration (Fixed Dialect) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Cleaned up the dialect to match modern Spring Boot 3 standards
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Redis Configuration ---
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

#rabbit configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Tell Spring RabbitMQ to trust your DTO package structures
spring.amqp.deserialization.trust.all=true
# If a listener fails to process or parse a message, drop it instead of retrying infinitely
spring.rabbitmq.listener.simple.default-requeue-rejected=false